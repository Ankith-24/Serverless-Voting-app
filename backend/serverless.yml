service: polling-app

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  timeout: 25
  memorySize: 512
  environment:
    USERS_TABLE: ${self:service}-users-${self:provider.stage}
    ELECTIONS_TABLE: ${self:service}-elections-${self:provider.stage}
    VOTES_TABLE: ${self:service}-votes-${self:provider.stage}
    JWT_SECRET: ${param:jwtSecret}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt UsersTable.Arn
            - !GetAtt ElectionsTable.Arn
            - !GetAtt VotesTable.Arn
            - !Join ['/', [!GetAtt UsersTable.Arn, 'index', '*']]
            - !Join ['/', [!GetAtt ElectionsTable.Arn, 'index', '*']]
            - !Join ['/', [!GetAtt VotesTable.Arn, 'index', '*']]
  httpApi:
    cors:
      allowedOrigins:
        - http://localhost:5173
        - http://localhost:5174
        - http://localhost:5175
        - http://localhost:3000
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001

params:
  dev:
    jwtSecret: local-dev-secret-not-for-production
  prod:
    jwtSecret: ${ssm:/pollapp/prod/jwt-secret}


functions:
  # Auth
  register:
    handler: src/handlers/auth.register
    timeout: 20
    memorySize: 512
    events:
      - httpApi:
          path: /api/auth/register
          method: post

  login:
    handler: src/handlers/auth.login
    timeout: 20
    memorySize: 512
    events:
      - httpApi:
          path: /api/auth/login
          method: post

  getMe:
    handler: src/handlers/auth.getMe
    timeout: 15
    memorySize: 512
    events:
      - httpApi:
          path: /api/auth/me
          method: get

  # Users (Super Admin)
  getUsers:
    handler: src/handlers/users.getUsers
    events:
      - httpApi:
          path: /api/users
          method: get

  createUser:
    handler: src/handlers/users.createUser
    events:
      - httpApi:
          path: /api/users
          method: post

  deleteUser:
    handler: src/handlers/users.deleteUser
    events:
      - httpApi:
          path: /api/users/{userId}
          method: delete

  updateUserRole:
    handler: src/handlers/users.updateUserRole
    events:
      - httpApi:
          path: /api/users/{userId}/role
          method: put

  updateUserEligibility:
    handler: src/handlers/users.updateUserEligibility
    events:
      - httpApi:
          path: /api/users/{userId}/eligible
          method: put

  # Elections
  createElection:
    handler: src/handlers/elections.createElection
    events:
      - httpApi:
          path: /api/elections
          method: post

  getElections:
    handler: src/handlers/elections.getElections
    events:
      - httpApi:
          path: /api/elections
          method: get

  getElection:
    handler: src/handlers/elections.getElection
    events:
      - httpApi:
          path: /api/elections/{electionId}
          method: get

  updateElection:
    handler: src/handlers/elections.updateElection
    events:
      - httpApi:
          path: /api/elections/{electionId}
          method: put

  updateElectionStatus:
    handler: src/handlers/elections.updateElectionStatus
    events:
      - httpApi:
          path: /api/elections/{electionId}/status
          method: put

  deleteElection:
    handler: src/handlers/elections.deleteElection
    events:
      - httpApi:
          path: /api/elections/{electionId}
          method: delete

  # Votes
  castVote:
    handler: src/handlers/votes.castVote
    events:
      - httpApi:
          path: /api/elections/{electionId}/vote
          method: post

  getResults:
    handler: src/handlers/votes.getResults
    events:
      - httpApi:
          path: /api/elections/{electionId}/results
          method: get

resources:
  Resources:
    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.USERS_TABLE}
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: email-index
            KeySchema:
              - AttributeName: email
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    ElectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ELECTIONS_TABLE}
        AttributeDefinitions:
          - AttributeName: electionId
            AttributeType: S
          - AttributeName: createdBy
            AttributeType: S
        KeySchema:
          - AttributeName: electionId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: createdBy-index
            KeySchema:
              - AttributeName: createdBy
                KeyType: HASH
            Projection:
              ProjectionType: ALL
        BillingMode: PAY_PER_REQUEST

    VotesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.VOTES_TABLE}
        AttributeDefinitions:
          - AttributeName: electionId
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: electionId
            KeyType: HASH
          - AttributeName: userId
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
